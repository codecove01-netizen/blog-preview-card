<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Frontend Mentor Blog Preview Card solution built with semantic HTML and CSS. 
        Responsive design featuring Flexbox and fluid typography.">

    <link rel="stylesheet" href="./styles.css">
     <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="./images/favicon-32x32.png"  type="image/png" sizes="32x32">

    <title>Blog Preview Card | Frontend Mentor</title>
</head>
<body>
    <!-- Main Container -->
    <div class="container">
          <!-- Blog Card -->
        <main> 
            <article class="card">

                <img src="./images/illustration-article.svg" alt="Illustration of HTML and CSS article" class="card-image">
        
                <p class="card-tag">Learning</p>

                <p datetime="2023-12-21" class="card-date">Published 21 Dec 2023</p>
        
                <h1 class="card-title"><a href="#">HTML & CSS foundations</a></h1>

                <p class="card-description">These languages are the backbone of every website, defining structure, content, 
                    and presentation.</p>

                <div class="author">
                    <img src="./images/image-avatar.webp" alt="Portrait of Greg Hooper" class="author-image" loading="lazy"> 
                    <span class="author-name">Greg Hooper</span>
                </div>
            </article>
        </main>
     <!-- Footer -->
    <footer>
        <p>Challenge by <a href="https://www.frontendmentor.io/challenges/blog-preview-card-ckPaj01IcS">Frontend Mentor</a>. 
            Coded by <a href='https://github.com/codecove01-netizen/blog-preview-card'>Arati D'sa</a>.</p>
    </footer>
    </div>
</body>
</html>
